name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze lib/ bin/ test/
      - name: Unit tests
        run: dart test --exclude-tags=e2e

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install hmr dependencies
        run: dart pub get
      - name: Install example dependencies
        run: dart pub get
        working-directory: example
      - name: E2E tests
        run: dart test --tags=e2e
