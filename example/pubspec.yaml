name: example
description: Example CLI app demonstrating hmr hot reload.
version: 1.0.0
publish_to: none

hmr:
  entrypoint: bin/main.dart
  includes:
    - '**/*.txt'
    - '**/*.dart'

environment:
  sdk: ^3.5.3

dependencies:
  hmr:
    path: ..

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
